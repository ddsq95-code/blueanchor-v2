<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>결제하기 - 블루앵커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800 min-h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 w-full z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center gap-4">
            <a href="javascript:history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </a>
            <span class="text-lg font-black tracking-tight">예약 및 결제</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-1 flex flex-col lg:flex-row gap-8">
        
        <!-- 좌측: 예약 폼 -->
        <div class="flex-1 space-y-6">
            <!-- 예약자 정보 -->
            <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fa-solid fa-user-pen text-blue-600 text-xl"></i>
                    <h2 class="text-lg font-black text-slate-800">예약자 정보</h2>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[13px] font-bold text-slate-600 mb-2">이름 (실명)</label>
                        <input type="text" id="reserveName" placeholder="탑승자 본인 실명 입력" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-slate-600 mb-2">연락처</label>
                        <input type="tel" id="reservePhone" placeholder="- 없이 숫자만 입력" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-slate-600 mb-2">선장님께 남길 요청사항 (선택)</label>
                        <textarea placeholder="장비 대여 문의, 기타 요청사항 등을 남겨주세요." rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors resize-none"></textarea>
                    </div>
                </div>
            </section>

            <!-- 결제 수단 -->
            <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fa-solid fa-credit-card text-blue-600 text-xl"></i>
                    <h2 class="text-lg font-black text-slate-800">결제 수단</h2>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="paymentMethod" checked class="peer sr-only">
                        <div class="p-4 rounded-xl border-2 border-slate-200 bg-white peer-checked:border-blue-600 peer-checked:bg-blue-50 text-center transition-all">
                            <i class="fa-regular fa-credit-card text-2xl text-slate-400 peer-checked:text-blue-600 mb-2 block"></i>
                            <span class="text-sm font-bold text-slate-600 peer-checked:text-blue-600 block">신용/체크카드</span>
                        </div>
                        <i class="fa-solid fa-circle-check absolute top-2 right-2 text-blue-600 opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                    </label>
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="paymentMethod" class="peer sr-only">
                        <div class="p-4 rounded-xl border-2 border-slate-200 bg-white peer-checked:border-yellow-400 peer-checked:bg-yellow-50 text-center transition-all">
                            <i class="fa-solid fa-comment text-2xl text-slate-400 peer-checked:text-yellow-500 mb-2 block"></i>
                            <span class="text-sm font-bold text-slate-600 peer-checked:text-yellow-600 block">카카오페이</span>
                        </div>
                    </label>
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="paymentMethod" class="peer sr-only">
                        <div class="p-4 rounded-xl border-2 border-slate-200 bg-white peer-checked:border-green-500 peer-checked:bg-green-50 text-center transition-all">
                            <i class="fa-solid fa-n text-2xl text-slate-400 peer-checked:text-green-500 mb-2 block"></i>
                            <span class="text-sm font-bold text-slate-600 peer-checked:text-green-600 block">네이버페이</span>
                        </div>
                    </label>
                    <label class="relative cursor-pointer group">
                        <input type="radio" name="paymentMethod" class="peer sr-only">
                        <div class="p-4 rounded-xl border-2 border-slate-200 bg-white peer-checked:border-slate-800 peer-checked:bg-slate-100 text-center transition-all">
                            <i class="fa-solid fa-building-columns text-2xl text-slate-400 peer-checked:text-slate-800 mb-2 block"></i>
                            <span class="text-sm font-bold text-slate-600 peer-checked:text-slate-800 block">무통장 입금</span>
                        </div>
                    </label>
                </div>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <ul class="text-[11px] text-slate-500 space-y-1.5 font-medium list-disc pl-4">
                        <li>결제 완료 후 선장님 확정이 진행되며, 기상 악화 시 100% 전액 환불됩니다.</li>
                        <li>단순 변심에 의한 취소 시 선사 규정에 따라 위약금이 발생할 수 있습니다.</li>
                    </ul>
                </div>
            </section>
        </div>

        <!-- 우측: 결제 요약 카드 (Sticky) -->
        <div class="w-full lg:w-[380px] shrink-0">
            <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden sticky top-24">
                
                <!-- 썸네일 -->
                <div class="h-32 bg-slate-200 relative overflow-hidden">
                    <img id="payBoatImg" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 right-4">
                        <p class="text-white/80 text-[11px] font-bold mb-0.5" id="payBoatSpec">9.77t / 22명</p>
                        <h3 class="text-white text-xl font-black tracking-tight" id="payBoatName">선사 이름</h3>
                    </div>
                </div>

                <div class="p-6">
                    <div class="space-y-3 mb-6 pb-6 border-b border-slate-100">
                        <div class="flex justify-between items-center">
                            <span class="text-[13px] font-bold text-slate-400 flex items-center gap-1.5"><i class="fa-regular fa-calendar text-slate-300"></i> 출조일</span>
                            <span class="text-[14px] font-black text-slate-800" id="payDate">2026. 06. 22. (월)</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[13px] font-bold text-slate-400 flex items-center gap-1.5"><i class="fa-solid fa-user-group text-slate-300"></i> 예약 인원</span>
                            <span class="text-[14px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded" id="payGuests">1명</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mb-6">
                        <span class="text-[13px] font-black text-slate-800">최종 결제 금액</span>
                        <div class="text-3xl font-black text-rose-500 tracking-tight">
                            <span id="payTotal">0</span><span class="text-lg text-slate-800 ml-0.5">원</span>
                        </div>
                    </div>

                    <button type="button" onclick="processPayment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-4 rounded-xl transition-all shadow-md shadow-blue-600/20 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-lock text-sm"></i> 안전하게 결제하기
                    </button>
                    
                    <p class="text-center text-[10px] text-slate-400 font-bold mt-4">
                        안전결제(에스크로) 서비스가 적용되어 있습니다.
                    </p>
                </div>
            </div>
        </div>
    </main>

<script>
    // 💡 화면 로드 시 이전 페이지(detail.html)에서 넘겨준 예약 정보 렌더링
    document.addEventListener('DOMContentLoaded', () => {
        const rawData = sessionStorage.getItem('currentBooking');
        const token = localStorage.getItem('blueanchor_token');
        const name = localStorage.getItem('blueanchor_name');
        
        // 로그인 한 사용자의 이름을 폼에 자동 채워넣기
        if (name) {
            document.getElementById('reserveName').value = name;
        }

        if (rawData) {
            const data = JSON.parse(rawData);
            document.getElementById('payBoatName').innerText = data.boatName;
            document.getElementById('payBoatSpec').innerText = data.boatSpec;
            document.getElementById('payDate').innerText = data.date;
            document.getElementById('payGuests').innerText = data.guests + "명";
            document.getElementById('payTotal').innerText = data.totalPrice.toLocaleString();
            document.getElementById('payBoatImg').src = data.imgUrl;
        } else {
            alert("비정상적인 접근이거나 예약 정보가 없습니다.");
            location.href = "index.html";
        }
    });

    // 💡 실제 API로 결제(예약) 정보 전송
    async function processPayment() {
        const token = localStorage.getItem('blueanchor_token');
        if (!token) {
            alert("로그인이 필요한 서비스입니다. 로그인 페이지로 이동합니다.");
            location.href = "login.html";
            return;
        }

        const rawData = sessionStorage.getItem('currentBooking');
        if (!rawData) return;
        const data = JSON.parse(rawData);

        const btn = document.querySelector('button[onclick="processPayment()"]');
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 결제 및 예약 진행 중...`;
        btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        btn.classList.add('bg-slate-400', 'cursor-not-allowed');
        
        const API_BASE_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://127.0.0.1:8000' : '';

        try {
            // 💡 수정: 경로 뒤의 슬래시(/) 제거
            const res = await fetch(`${API_BASE_URL}/api/reservation`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({
                    boat_id: data.boatId,
                    reserve_date: data.date,
                    guests: data.guests,
                    total_price: data.totalPrice
                })
            });

            if (res.ok) {
                alert("🎉 결제가 성공적으로 완료되었습니다!\n마이페이지로 이동하여 예약 내역을 확인해 보세요.");
                sessionStorage.removeItem('currentBooking');
                location.href = "mypage.html";
            } else {
                const errData = await res.json();
                // 상세 에러 내용을 얼럿에 표시하도록 수정
                alert(`결제 실패: ${errData.detail || '알 수 없는 오류'}\n(Status: ${res.status})`);
                btn.innerHTML = `<i class="fa-solid fa-lock text-sm"></i> 안전하게 결제하기`;
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.remove('bg-slate-400', 'cursor-not-allowed');
            }
        } catch (err) {
            console.error("Payment API Error:", err);
            alert("서버 통신 중 오류가 발생했습니다.");
            btn.innerHTML = `<i class="fa-solid fa-lock text-sm"></i> 안전하게 결제하기`;
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            btn.classList.remove('bg-slate-400', 'cursor-not-allowed');
        }
    }
</script>
</body>
</html>
