<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>예약 및 결제 - 블루앵커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 라디오 버튼 커스텀 (결제 수단용) */
        input[type="radio"]:checked + div {
            border-color: #2563eb;
            background-color: #eff6ff;
            color: #2563eb;
        }
        input[type="radio"]:checked + div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800 min-h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="javascript:history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-slate-500 hover:text-slate-800 transition-colors">
                    <i class="fa-solid fa-chevron-left text-xl"></i>
                </a>
                <span class="text-lg font-black tracking-tight">예약 및 결제</span>
            </div>
            <a href="index.html" class="flex items-center gap-2 text-blue-600">
                <i class="fa-solid fa-anchor text-xl"></i>
            </a>
        </div>
    </nav>

    <!-- 메인 결제 폼 레이아웃 -->
    <main class="max-w-5xl mx-auto px-4 py-8 md:py-10 flex flex-col lg:flex-row gap-8 w-full flex-1 relative">
        
        <!-- 좌측: 입력 폼 영역 -->
        <div class="flex-1 space-y-8">
            
            <!-- 1. 예약자 정보 -->
            <section class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-6 md:p-8">
                <h2 class="text-xl font-black text-slate-800 mb-6 tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-user-pen text-blue-600"></i> 예약자 정보
                </h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-[13px] font-bold text-slate-500 mb-2">이름 (실명)</label>
                        <input type="text" placeholder="승선 명부 작성용 실명을 입력하세요" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-slate-500 mb-2">연락처</label>
                        <input type="tel" placeholder="010-0000-0000" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                    <div>
                        <label class="block text-[13px] font-bold text-slate-500 mb-2">선장님께 남길 요청사항 (선택)</label>
                        <textarea rows="2" placeholder="장비 대여 문의, 기타 요청사항 등을 남겨주세요." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-medium text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors resize-none"></textarea>
                    </div>
                </div>
            </section>

            <!-- 2. 결제 수단 선택 -->
            <section class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-6 md:p-8">
                <h2 class="text-xl font-black text-slate-800 mb-6 tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-credit-card text-blue-600"></i> 결제 수단
                </h2>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- 일반 카드결제 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="payment_method" value="card" class="peer sr-only" checked>
                        <div class="border-2 border-slate-100 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition-colors h-24 text-slate-500">
                            <i class="fa-regular fa-credit-card text-2xl"></i>
                            <span class="text-[13px] font-bold">신용/체크카드</span>
                            <div class="check-icon absolute top-2 right-2 text-blue-600 opacity-0 scale-50 transition-all"><i class="fa-solid fa-circle-check"></i></div>
                        </div>
                    </label>

                    <!-- 카카오페이 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="payment_method" value="kakaopay" class="peer sr-only">
                        <div class="border-2 border-slate-100 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition-colors h-24 text-slate-500">
                            <i class="fa-solid fa-comment text-[#FEE500] text-2xl"></i>
                            <span class="text-[13px] font-bold">카카오페이</span>
                            <div class="check-icon absolute top-2 right-2 text-blue-600 opacity-0 scale-50 transition-all"><i class="fa-solid fa-circle-check"></i></div>
                        </div>
                    </label>

                    <!-- 네이버페이 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="payment_method" value="naverpay" class="peer sr-only">
                        <div class="border-2 border-slate-100 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition-colors h-24 text-slate-500">
                            <div class="w-6 h-6 rounded bg-[#03C75A] text-white flex items-center justify-center font-black text-[12px]">N</div>
                            <span class="text-[13px] font-bold">네이버페이</span>
                            <div class="check-icon absolute top-2 right-2 text-blue-600 opacity-0 scale-50 transition-all"><i class="fa-solid fa-circle-check"></i></div>
                        </div>
                    </label>
                    
                    <!-- 무통장입금 -->
                    <label class="cursor-pointer relative">
                        <input type="radio" name="payment_method" value="bank" class="peer sr-only">
                        <div class="border-2 border-slate-100 rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition-colors h-24 text-slate-500">
                            <i class="fa-solid fa-building-columns text-2xl"></i>
                            <span class="text-[13px] font-bold">무통장 입금</span>
                            <div class="check-icon absolute top-2 right-2 text-blue-600 opacity-0 scale-50 transition-all"><i class="fa-solid fa-circle-check"></i></div>
                        </div>
                    </label>
                </div>
                
                <div class="mt-4 p-4 bg-slate-50 rounded-xl text-[12px] text-slate-500 leading-relaxed font-medium">
                    <ul class="list-disc pl-4 space-y-1">
                        <li>결제 완료 후 선장님 확정이 진행되며, 기상 악화 시 100% 전액 환불됩니다.</li>
                        <li>단순 변심에 의한 취소 시 선사 규정에 따라 위약금이 발생할 수 있습니다.</li>
                    </ul>
                </div>
            </section>
        </div>

        <!-- 우측: 결제 상세 요약 (Sticky) -->
        <div class="lg:w-[380px] shrink-0">
            <div class="sticky top-24 bg-white rounded-3xl overflow-hidden shadow-xl border border-slate-100">
                
                <!-- 예약할 선사 정보 -->
                <div class="relative h-32 overflow-hidden bg-slate-800">
                    <img id="payBoatImg" src="" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 right-4">
                        <div class="text-[11px] text-slate-300 font-bold mb-0.5" id="payBoatSpec">제원 정보</div>
                        <h3 class="text-xl font-black text-white tracking-tight" id="payBoatName">선사 이름</h3>
                    </div>
                </div>

                <!-- 상세 요약 -->
                <div class="p-6">
                    <div class="space-y-4 mb-6 pb-6 border-b border-slate-100 border-dashed">
                        <div class="flex justify-between items-start">
                            <span class="text-[13px] font-bold text-slate-400 mt-0.5"><i class="fa-regular fa-calendar text-slate-300 mr-1.5"></i> 출조일</span>
                            <span class="text-[15px] font-black text-slate-800 text-right" id="payDate">2026. 06. 20. (토)</span>
                        </div>
                        <div class="flex justify-between items-start">
                            <span class="text-[13px] font-bold text-slate-400 mt-0.5"><i class="fa-solid fa-user-group text-slate-300 mr-1"></i> 예약 인원</span>
                            <span class="text-[15px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md" id="payGuests">1명</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mb-6">
                        <span class="text-[14px] font-black text-slate-800">최종 결제 금액</span>
                        <div class="text-3xl font-black text-rose-500 tracking-tight">
                            <span id="payTotal">0</span><span class="text-[15px] font-bold ml-0.5 text-slate-800">원</span>
                        </div>
                    </div>

                    <button type="button" onclick="processPayment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-4 rounded-xl transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-lock text-sm"></i> 안전하게 결제하기
                    </button>
                    <p class="text-center text-[11px] text-slate-400 mt-3 font-medium">안전결제(에스크로) 서비스가 적용되어 있습니다.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 스크립트: 세션 스토리지 데이터 로드 및 렌더링 -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 상세 페이지에서 넘어온 데이터 불러오기
            const rawData = sessionStorage.getItem('currentBooking');
            
            if (rawData) {
                const data = JSON.parse(rawData);
                document.getElementById('payBoatName').innerText = data.boatName;
                document.getElementById('payBoatSpec').innerText = data.boatSpec;
                document.getElementById('payDate').innerText = data.date;
                document.getElementById('payGuests').innerText = data.guests + "명";
                document.getElementById('payTotal').innerText = data.totalPrice.toLocaleString();
                document.getElementById('payBoatImg').src = data.imgUrl;
            } else {
                alert("비정상적인 접근이거나 예약 정보가 없습니다.");
                location.href = "index.html";
            }
        });

        function processPayment() {
            const btn = document.querySelector('button[onclick="processPayment()"]');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 결제 처리 중...`;
            btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btn.classList.add('bg-slate-400', 'cursor-not-allowed');
            
            // 2초 뒤 결제 성공 알림 띄우기
            setTimeout(() => {
                alert("🎉 결제가 성공적으로 완료되었습니다!\n예약 내역에서 확정 여부를 확인해 주세요.");
                sessionStorage.removeItem('currentBooking'); // 데이터 비우기
                location.href = "index.html"; // 메인으로 돌아가기
            }, 1500);
        }
    </script>
</body>
</html>
