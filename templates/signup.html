<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회원가입 - 블루앵커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 w-full z-50">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="login.html" class="w-10 h-10 flex items-center justify-center -ml-2 text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </a>
            <span class="text-lg font-black tracking-tight">이메일 회원가입</span>
            <div class="w-10"></div> <!-- 간격 맞춤용 빈 공간 -->
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center py-10 px-4">
        <div class="w-full max-w-md space-y-8">
            
            <div class="text-left">
                <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-2">환영합니다! <i class="fa-solid fa-hands-clapping text-amber-400"></i></h1>
                <p class="text-sm font-medium text-slate-500">예약 및 조황 확인을 위해 가입을 진행해 주세요.</p>
            </div>

            <!-- 💡 폼에 id="signupForm" 추가 -->
            <form id="signupForm" class="space-y-5 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                
                <div>
                    <label class="block text-[13px] font-bold text-slate-600 mb-2">이름</label>
                    <!-- 💡 id="name" 추가 -->
                    <input type="text" id="name" required placeholder="실명을 입력해 주세요" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-slate-600 mb-2">휴대폰 번호</label>
                    <div class="flex gap-2">
                        <!-- 💡 id="phone" 추가 -->
                        <input type="tel" id="phone" required placeholder="- 없이 숫자만 입력" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                        <button type="button" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-4 rounded-xl text-[13px] transition-colors whitespace-nowrap shadow-sm">인증받기</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-slate-600 mb-2">이메일 아이디</label>
                    <!-- 💡 id="email" 추가 -->
                    <input type="email" id="email" required placeholder="example@blueanchor.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-slate-600 mb-2">비밀번호</label>
                    <!-- 💡 id="password" 추가, 최소 길이 지정 -->
                    <input type="password" id="password" required minlength="6" placeholder="영문, 숫자, 특수문자 조합 8자 이상" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors mb-2">
                    <!-- 💡 id="password_confirm" 추가 -->
                    <input type="password" id="password_confirm" required placeholder="비밀번호를 한 번 더 입력해 주세요" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
                </div>

                <div class="pt-4 mt-4 border-t border-slate-100">
                    <label class="flex items-start gap-3 cursor-pointer group mb-3">
                        <input type="checkbox" required class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer mt-0.5">
                        <div class="flex-1">
                            <span class="text-[14px] font-black text-slate-800 group-hover:text-blue-600 transition-colors block">[필수] 전체 동의하기</span>
                            <span class="text-[11px] font-medium text-slate-400 block mt-1">이용약관, 개인정보 수집 및 이용, 마케팅 정보 수신 동의를 포함합니다.</span>
                        </div>
                    </label>
                </div>

                <!-- 💡 type="submit" 으로 변경, id="signupBtn" 추가 -->
                <button type="submit" id="signupBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-4 rounded-xl transition-all shadow-md mt-6">
                    가입 완료하기
                </button>
            </form>
        </div>
    </main>

    <!-- 💡 대망의 API 연동 자바스크립트 추가 -->
    <script>
        const API_BASE_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://127.0.0.1:8000' : '';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 폼 기본 전송 막기

            // 1. 비밀번호 일치 확인
            const pw1 = document.getElementById('password').value;
            const pw2 = document.getElementById('password_confirm').value;
            
            if(pw1 !== pw2) {
                alert("비밀번호가 일치하지 않습니다. 다시 확인해 주세요.");
                return;
            }

            // 2. 버튼 상태 변경 (로딩 중)
            const btn = document.getElementById('signupBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 처리 중...`;
            btn.disabled = true;
            
            try {
                // 3. 백엔드 API로 데이터 전송
                const res = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: pw1,
                        phone: document.getElementById('phone').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert("축하합니다! 회원가입이 완료되었습니다.\n로그인 페이지로 이동합니다.");
                    location.href = 'login.html';
                } else {
                    alert(data.detail || "회원가입에 실패했습니다.");
                    btn.innerHTML = `가입 완료하기`;
                    btn.disabled = false;
                }
            } catch (err) {
                alert("서버 통신 오류가 발생했습니다.");
                btn.innerHTML = `가입 완료하기`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
