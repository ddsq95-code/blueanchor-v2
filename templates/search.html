<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 💡 강제 다크 모드 차단: 모바일에서도 무조건 화이트 톤으로 렌더링되게 합니다 -->
    <meta name="color-scheme" content="light only">
    <title>배낚시 검색결과 - 블루앵커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    
    <style>
        :root { color-scheme: light; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        /* 카드 내부 이미지 슬라이더 커스텀 (야놀자 스타일) */
        .innerImageSwiper .swiper-button-next,
        .innerImageSwiper .swiper-button-prev {
            width: 28px; height: 28px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: #334155;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        .innerImageSwiper .swiper-button-next:active,
        .innerImageSwiper .swiper-button-prev:active { transform: scale(0.9); }
        .smart-link-card:hover .innerImageSwiper .swiper-button-next,
        .smart-link-card:hover .innerImageSwiper .swiper-button-prev { opacity: 1; }
        .innerImageSwiper .swiper-button-next::after,
        .innerImageSwiper .swiper-button-prev::after { font-size: 11px; font-weight: 900; }
        .innerImageSwiper .swiper-pagination { bottom: 6px; }
        .innerImageSwiper .swiper-pagination-bullet { background: #fff; opacity: 0.5; width: 6px; height: 6px; }
        .innerImageSwiper .swiper-pagination-bullet-active { background: #fff; opacity: 1; }
    </style>
</head>
<body class="bg-white md:bg-[#F4F6F8] font-sans antialiased text-slate-800 min-h-screen flex flex-col pb-20 md:pb-0">

    <!-- ==========================================
         📱 1. [모바일 전용] 상단 앱 헤더
    =========================================== -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-[60] md:hidden">
        <div class="px-4 h-14 flex items-center gap-3">
            <a href="index.html" class="p-1 -ml-1 text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </a>
            <div class="flex-1 bg-slate-50 rounded-xl flex items-center px-3 py-2.5 cursor-pointer border border-slate-100" onclick="openSearchModal()">
                <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2 text-sm"></i>
                <span class="text-[13px] font-bold text-slate-500">어디로 떠나시나요?</span>
            </div>
        </div>
    </nav>

    <!-- ==========================================
         💻 2. [PC 전용] 상단 네비게이션
    =========================================== -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 w-full z-[60] hidden md:block">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="flex items-center gap-2 text-blue-600">
                    <i class="fa-solid fa-anchor text-2xl"></i>
                    <span class="text-xl font-black tracking-tight">블루앵커</span>
                </a>
                <div class="flex gap-6 font-bold text-[15px] text-slate-600 mt-1">
                    <a href="search.html" class="text-blue-600 transition-colors">배낚시 예약</a>
                    <a href="#" class="hover:text-blue-600 transition-colors">조황/조행기</a>
                    <a href="#" class="hover:text-blue-600 transition-colors">바다날씨/물때</a>
                    <a href="#" class="hover:text-blue-600 transition-colors">커뮤니티</a>
                    <a href="#" class="hover:text-blue-600 transition-colors text-rose-500 relative">이벤트<span class="absolute -top-2 -right-3 bg-rose-500 text-white text-[9px] px-1 rounded-sm">N</span></a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="#" class="relative text-slate-500 hover:text-rose-500 transition-colors flex items-center gap-1.5 font-bold text-sm">
                    <i class="fa-solid fa-heart text-lg text-slate-400"></i>
                    <span id="wishlistCount" class="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
                </a>
                <a href="login.html" class="text-sm font-bold text-slate-600 ml-2">로그인</a>
                <a href="captain.html" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[13px] font-bold hover:bg-blue-100 transition-colors border border-blue-100 flex items-center gap-1.5"><i class="fa-solid fa-ship"></i> 선장님 파트너 가입</a>
            </div>
        </div>
    </nav>

    <!-- 3. 서브 필터 바 (공통 영역) -->
    <div class="bg-white border-b border-slate-100 z-40 sticky top-14 md:top-16 shadow-sm md:shadow-none">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center gap-3 overflow-x-auto hide-scrollbar whitespace-nowrap bg-white">
            <button onclick="openSearchModal()" class="border border-slate-200 bg-white text-slate-700 px-4 py-1.5 rounded-full text-[13px] font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors shrink-0" id="filter-date-btn">
                06. 18
            </button>
            <button onclick="openSearchModal()" class="border border-slate-200 bg-white text-slate-700 px-4 py-1.5 rounded-full text-[13px] font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors shrink-0">
                <i class="fa-solid fa-location-dot text-slate-400"></i> <span id="filter-region-btn">보령</span>
            </button>
            <button onclick="openSearchModal()" class="border border-slate-200 bg-white text-slate-700 px-4 py-1.5 rounded-full text-[13px] font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors shrink-0">
                <i class="fa-solid fa-user-group text-slate-400"></i> <span id="filter-guest-btn">1명</span>
            </button>
            <button onclick="openSearchModal()" class="border border-slate-200 bg-white text-slate-700 px-4 py-1.5 rounded-full text-[13px] font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors shrink-0">
                <i class="fa-solid fa-fish text-slate-400"></i> <span id="filter-species-btn">전체</span>
            </button>
            
            <div class="w-px h-5 bg-slate-200 mx-1 shrink-0 hidden md:block"></div>
            
            <button onclick="openSearchModal()" class="border border-blue-500 bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[13px] font-bold items-center gap-2 hover:bg-blue-100 transition-colors shrink-0 hidden md:flex">
                <i class="fa-solid fa-sliders"></i> 상세 필터
            </button>
        </div>
    </div>

    <!-- 4. 메인 레이아웃 (해황 분석 + 선사 리스트) -->
    <main class="max-w-7xl mx-auto px-4 py-6 md:py-8 flex flex-col lg:flex-row gap-8 w-full flex-1 relative z-30 bg-white md:bg-transparent">
        
        <!-- 좌측: 해황 분석 사이드바 (모바일에선 리스트에 집중하도록 숨김 처리) -->
        <aside class="hidden lg:block w-[340px] shrink-0">
            <div id="sidebarTideCardContainer" class="sticky top-[136px] z-30">
                <!-- 로딩 스피너 기본값 -->
                <div class="flex flex-col items-center justify-center bg-white rounded-2xl border border-slate-200/80 text-slate-400 py-10 h-full min-h-[300px] shadow-sm">
                    <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i>
                    <span class="text-xs font-bold text-center mt-2">해양 데이터를 분석 중입니다...</span>
                </div>
            </div>
        </aside>

        <!-- 우측: 선사 리스트 -->
        <section class="flex-1 w-full bg-white md:bg-transparent">
            <div class="mb-4 md:mb-6 flex flex-col md:flex-row md:justify-between md:items-end gap-3 md:gap-4">
                <div>
                    <p class="text-[12px] md:text-[13px] font-bold text-slate-500 mb-0.5 md:mb-1" id="total-boat-count">총 0척의 낚싯배가 예약 가능합니다</p>
                    <h2 class="text-xl md:text-2xl font-black text-slate-800 tracking-tight">추천 출조 선사 리스트</h2>
                </div>
                
                <div class="flex items-center gap-2 self-start md:self-end w-full md:w-auto">
                    <!-- 평점 높은 순 드롭다운 -->
                    <div class="relative group flex-1 md:flex-none" id="sort-dropdown-container">
                        <button tabindex="0" class="w-full md:w-auto justify-between text-[13px] font-bold text-slate-600 border border-slate-200 px-3 py-1.5 rounded-lg bg-white hover:bg-slate-50 flex items-center gap-1.5 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-100">
                            <span class="flex items-center gap-1.5"><i class="fa-solid fa-arrow-down-short-wide text-slate-400"></i> <span id="sort-text">평점 높은 순</span></span> <i class="fa-solid fa-chevron-down text-[10px] ml-1 text-slate-400"></i>
                        </button>
                        <div class="absolute right-0 top-full mt-1 w-full md:w-32 bg-white border border-slate-200 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible group-focus-within:opacity-100 group-focus-within:visible transition-all duration-200 z-50 overflow-hidden">
                            <a href="javascript:void(0)" onclick="changeSort('평점 높은 순', this)" class="sort-item block px-4 py-2 text-[13px] font-bold text-blue-600 bg-blue-50">평점 높은 순</a>
                            <a href="javascript:void(0)" onclick="changeSort('최신 등록 순', this)" class="sort-item block px-4 py-2 text-[13px] font-medium text-slate-600 hover:bg-slate-50">최신 등록 순</a>
                            <a href="javascript:void(0)" onclick="changeSort('가격 낮은 순', this)" class="sort-item block px-4 py-2 text-[13px] font-medium text-slate-600 hover:bg-slate-50">가격 낮은 순</a>
                        </div>
                    </div>
                    
                    <!-- 태그 검색 버튼 -->
                    <button id="btn-open-tag" onclick="openTagModal()" class="flex-1 md:flex-none justify-center text-[13px] font-bold text-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg bg-blue-50 hover:bg-blue-100 flex items-center gap-1.5 transition-colors shadow-sm whitespace-nowrap">
                        <i class="fa-solid fa-tags text-blue-500"></i> 태그 검색
                    </button>
                </div>
            </div>

            <!-- 통일된 디자인의 카드 그리드 -->
            <!-- 💡 자바스크립트(ui.js)가 DB에서 데이터를 가져와 이곳에 카드를 자동으로 채워 넣습니다! -->
            <div id="boat-list-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5 transition-opacity duration-300">
            </div>
        </section>
    </main>

    <!-- 푸터 다크 테마 배경 맞춤 (PC 전용) -->
    <div class="h-20 bg-[#1A1F2C] mt-auto hidden md:block"></div>

    <!-- 공통 토스트 알림 컨테이너 영역 -->
    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- ==========================================
         📱 5. [모바일 전용] 하단 네비게이션 탭
    =========================================== -->
    <div class="fixed md:hidden bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-between px-6 pt-2.5 pb-6 z-[80] shadow-[0_-5px_20px_rgba(0,0,0,0.03)]">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
            <i class="fa-solid fa-house text-[20px]"></i>
            <span class="text-[10px] font-bold mt-0.5">홈</span>
        </a>
        <a href="search.html" class="flex flex-col items-center gap-1 text-blue-600 transition-colors">
            <i class="fa-solid fa-magnifying-glass text-[20px] drop-shadow-sm"></i>
            <span class="text-[10px] font-bold mt-0.5">검색</span>
        </a>
        <a href="javascript:void(0)" onclick="if(typeof showToast==='function') showToast('찜 내역은 마이페이지에서 확인 가능합니다.'); else alert('찜 내역은 마이페이지에서 확인 가능합니다.');" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
            <i class="fa-solid fa-heart text-[20px]"></i>
            <span class="text-[10px] font-bold mt-0.5">찜</span>
        </a>
        <a href="mypage.html" class="flex flex-col items-center gap-1 text-slate-400 transition-colors">
            <i class="fa-solid fa-user text-[20px]"></i>
            <span class="text-[10px] font-bold mt-0.5">마이</span>
        </a>
    </div>

    <!-- ===================================== -->
    <!-- 💡 필터 모달 (맞춤 출조 통합 검색) -->
    <!-- ===================================== -->
    <div id="filter-modal" onclick="if(event.target === this && typeof closeSearchModal === 'function') closeSearchModal()" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 transition-all duration-300">
        <div class="bg-[#f8fafc] w-full max-w-6xl h-[90vh] md:h-[80vh] rounded-t-3xl md:rounded-3xl flex flex-col overflow-hidden shadow-2xl relative">
            <div class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-blue-600 text-xl"></i>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight">맞춤 출조 선사 통합 검색</h2>
                </div>
                <button type="button" onclick="closeSearchModal()" class="w-10 h-10 bg-slate-50 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-4">
                    <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm">
                        <div class="flex items-center gap-2 mb-4"><i class="fa-regular fa-calendar-check text-blue-500"></i><h3 class="font-bold text-slate-700">출조 날짜</h3></div>
                        <div id="calendarContainer" class="w-full"></div>
                    </div>
                    
                    <!-- 💡 수정된 부분: 모바일 환경(hidden)에서는 물때표를 숨기고 PC(md:block)에서만 보여줌 -->
                    <div id="tideCardContainer" class="hidden md:block w-full h-full min-h-[350px]"></div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm flex flex-col">
                    <div class="flex items-center gap-2 mb-4 shrink-0"><i class="fa-solid fa-map-location-dot text-blue-500"></i><h3 class="font-bold text-slate-700">출항 지역</h3></div>
                    <div class="flex bg-slate-50 rounded-xl p-1 mb-4 shrink-0 border border-slate-100" id="regionTabs"></div>
                    <div class="grid grid-cols-2 gap-2 overflow-y-auto pr-2 custom-scrollbar flex-1 content-start" id="regionGrid"></div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm flex flex-col">
                    <div class="flex items-center gap-2 mb-4 shrink-0"><i class="fa-solid fa-fish text-blue-500"></i><h3 class="font-bold text-slate-700">상세 조건</h3></div>
                    <div class="mb-6">
                        <h4 class="text-xs font-bold text-slate-400 mb-2">탑승 인원</h4>
                        <div class="flex items-center justify-between border border-slate-200 rounded-xl p-2 bg-slate-50">
                            <button type="button" onclick="if(typeof changeGuest === 'function') changeGuest(-1)" class="w-10 h-10 bg-white border border-slate-200 rounded-lg flex justify-center items-center text-slate-600 hover:text-blue-500"><i class="fa-solid fa-minus"></i></button>
                            <span class="font-black text-xl text-slate-800 w-16 text-center" id="modalGuestText">1</span>
                            <button type="button" onclick="if(typeof changeGuest === 'function') changeGuest(1)" class="w-10 h-10 bg-white border border-slate-200 rounded-lg flex justify-center items-center text-slate-600 hover:text-blue-500"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col min-h-0">
                        <h4 class="text-xs font-bold text-slate-400 mb-2">출조 대상 어종</h4>
                        <div class="grid grid-cols-2 gap-2 overflow-y-auto pr-2 custom-scrollbar content-start" id="speciesGrid"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white border-t border-slate-100 p-4 shrink-0">
                <button type="button" onclick="applyFilters()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-colors text-lg flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> 선택한 조건으로 재검색
                </button>
            </div>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- 💡 태그 검색 모달 팝업 추가 -->
    <!-- ===================================== -->
    <div id="tag-modal" onclick="if(event.target === this) closeTagModal()" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-3xl md:rounded-2xl flex flex-col overflow-hidden shadow-2xl animate-[slideUp_0.3s_ease-out]">
            <div class="border-b border-slate-100 px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-tags text-blue-600"></i>
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">상세 태그 검색</h2>
                </div>
                <button type="button" onclick="closeTagModal()" class="w-8 h-8 bg-slate-50 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <div class="mb-6">
                    <h3 class="text-[13px] font-bold text-slate-500 mb-3"><i class="fa-solid fa-fish-fins mr-1"></i> 어종 및 낚시 장르</h3>
                    <div class="flex flex-wrap gap-2" id="tag-group-species">
                        <!-- JS에서 동적으로 렌더링 됩니다 -->
                    </div>
                </div>
                <div>
                    <h3 class="text-[13px] font-bold text-slate-500 mb-3"><i class="fa-solid fa-anchor mr-1"></i> 선사 및 편의 시설</h3>
                    <div class="flex flex-wrap gap-2" id="tag-group-facility">
                        <!-- JS에서 동적으로 렌더링 됩니다 -->
                    </div>
                </div>
            </div>
            <div class="border-t border-slate-100 p-4 flex gap-2">
                <button type="button" onclick="resetTags()" class="px-5 py-3 rounded-xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-colors">초기화</button>
                <button type="button" onclick="applyTags()" class="flex-1 bg-blue-600 text-white font-black py-3 rounded-xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                    <span id="tag-apply-count">0</span>개 태그 적용하기
                </button>
            </div>
        </div>
    </div>

    <!-- 💡 ui.js 로드 -->
    <script src="js/ui.js"></script>

    <!-- 💡 Swiper JS 및 초기화 스크립트 추가 (동적 데이터 인식 옵션 적용) -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if(typeof Swiper !== 'undefined') {
                const innerImageSwipers = new Swiper('.innerImageSwiper', {
                    loop: true,
                    nested: true,
                    observer: true,        // ui.js를 통해 카드가 나중에 생성되어도 Swiper가 인식하도록 설정
                    observeParents: true,
                    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                    pagination: { el: '.swiper-pagination', clickable: true },
                });
            }
        });
    </script>
</body>
</html>
