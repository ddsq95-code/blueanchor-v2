<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 - 블루앵커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800 min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 relative">
        <!-- 뒤로가기 버튼 -->
        <a href="index.html" class="absolute top-6 left-6 w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-50 hover:text-slate-800 transition-colors">
            <i class="fa-solid fa-xmark text-xl"></i>
        </a>

        <div class="text-center mb-8 mt-4">
            <div class="inline-flex items-center gap-2 text-blue-600 mb-6">
                <i class="fa-solid fa-anchor text-3xl"></i>
                <span class="text-2xl font-black tracking-tight">블루앵커</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-2">반갑습니다!</h1>
            <p class="text-slate-500 text-sm font-medium">안전하고 빠른 배낚시 예약을 시작해보세요.</p>
        </div>

        <!-- 💡 id="loginForm" 추가됨 -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-[13px] font-bold text-slate-600 mb-1.5 ml-1">이메일 아이디</label>
                <!-- 💡 id="email" 추가됨 -->
                <input type="email" id="email" required placeholder="example@blueanchor.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
            </div>
            <div>
                <label class="block text-[13px] font-bold text-slate-600 mb-1.5 ml-1">비밀번호</label>
                <!-- 💡 id="password" 추가됨 -->
                <input type="password" id="password" required placeholder="비밀번호를 입력하세요" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-colors">
            </div>

            <!-- 💡 id="loginBtn" 추가됨 -->
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-4 rounded-xl transition-all shadow-md mt-6">
                이메일로 로그인
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-[13px] text-slate-500 font-medium">아직 계정이 없으신가요? 
                <a href="signup.html" class="text-blue-600 font-bold ml-1 hover:underline">회원가입하기</a>
            </p>
        </div>
    </div>

    <!-- 💡 대망의 API 연동 자바스크립트 추가 -->
    <script>
        const API_BASE_URL = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://127.0.0.1:8000' : '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 폼 기본 전송 막기
            
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 로그인 중...`;
            btn.disabled = true;
            
            try {
                // 백엔드 API로 데이터 전송
                const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // 성공 시 로컬 스토리지에 토큰과 이름 저장
                    localStorage.setItem('blueanchor_token', data.token);
                    localStorage.setItem('blueanchor_name', data.name);
                    
                    // 메인 페이지로 이동
                    location.href = 'index.html';
                } else {
                    alert(data.detail || "이메일 또는 비밀번호가 틀렸습니다.");
                    btn.innerHTML = `이메일로 로그인`;
                    btn.disabled = false;
                }
            } catch (err) {
                alert("서버 통신 오류가 발생했습니다.");
                btn.innerHTML = `이메일로 로그인`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
